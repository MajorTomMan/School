name: Finalize minimal UI once

on:
  push:
    branches: ["feat/scene-ui-minimal-preview"]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/scene-ui-minimal-preview
      - name: Connect minimal screens and clean imports
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          scene = Path("app/src/main/java/com/majortomman/school/ui/ScenePreviewScreens.kt")
          text = scene.read_text(encoding="utf-8")
          old = """        LearningScreen(
              lesson = lesson,"""
          new = """        MinimalLearningScreen(
              lesson = lesson,"""
          if old not in text:
              raise SystemExit("Legacy learning call was not found")
          scene.write_text(text.replace(old, new, 1), encoding="utf-8")

          minimal = Path("app/src/main/java/com/majortomman/school/ui/MinimalRemainingScreens.kt")
          text = minimal.read_text(encoding="utf-8")
          text = text.replace("import androidx.compose.foundation.BasicTooltipBox\n", "")
          text = text.replace("import androidx.compose.ui.graphics.Brush\n", "")
          text = text.replace("import androidx.compose.ui.text.style.TextAlign\n", "")
          minimal.write_text(text, encoding="utf-8")
          PY
          rm .github/workflows/finalize-minimal-ui-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/majortomman/school/ui/ScenePreviewScreens.kt \
                  app/src/main/java/com/majortomman/school/ui/MinimalRemainingScreens.kt \
                  .github/workflows/finalize-minimal-ui-once.yml
          git commit -m "界面：接入完整极简学习流程"
          git push origin HEAD:feat/scene-ui-minimal-preview
