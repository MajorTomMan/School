name: Export local Android environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export-android-env:
    if: github.head_ref == 'agent/full-math-course-pack-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: android-actions/setup-android@v3

      - name: Install runtime components
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "cmdline-tools;latest" \
            "system-images;android-30;aosp_atd;x86_64"

      - name: Package portable environment
        shell: bash
        run: |
          set -euxo pipefail
          root="$ANDROID_HOME"
          mkdir -p build
          paths=(
            platform-tools
            emulator
            cmdline-tools/latest
            system-images/android-30/aosp_atd/x86_64
          )
          if [ -d "$root/licenses" ]; then paths+=(licenses); fi
          printf '%s\n' "${paths[@]}"
          du -sh "${paths[@]/#/$root/}"
          tar -C "$root" -cf build/android-local-env.tar "${paths[@]}"
          sha256sum build/android-local-env.tar > build/android-local-env.tar.sha256
          du -sh build/android-local-env.tar

      - uses: actions/upload-artifact@v4
        with:
          name: android-local-env
          path: |
            build/android-local-env.tar
            build/android-local-env.tar.sha256
          compression-level: 0
          if-no-files-found: error
