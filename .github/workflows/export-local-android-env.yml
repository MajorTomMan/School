name: Export local Android environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export-android-env:
    if: github.head_ref == 'agent/full-math-course-pack-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: android-actions/setup-android@v3

      - name: Install lightweight API 26 image
        shell: bash
        run: |
          set -euxo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "system-images;android-26;default;x86"

      - name: Package image into downloadable parts
        shell: bash
        run: |
          set -euxo pipefail
          root="$ANDROID_HOME"
          image="system-images/android-26/default/x86"
          mkdir -p build
          du -sh "$root/$image"
          tar -C "$root" -cf - "$image" \
            | gzip -1 \
            | split -b 300M -d -a 2 - build/android-api26-image.tar.gz.part-
          sha256sum build/android-api26-image.tar.gz.part-* > build/android-api26-image.parts.sha256
          ls -lh build/android-api26-image.tar.gz.part-* build/android-api26-image.parts.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: android-api26-image-meta
          path: build/android-api26-image.parts.sha256
          compression-level: 0
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('build/android-api26-image.tar.gz.part-00') != '' }}
        with:
          name: android-api26-image-part-00
          path: build/android-api26-image.tar.gz.part-00
          compression-level: 0
      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('build/android-api26-image.tar.gz.part-01') != '' }}
        with:
          name: android-api26-image-part-01
          path: build/android-api26-image.tar.gz.part-01
          compression-level: 0
      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('build/android-api26-image.tar.gz.part-02') != '' }}
        with:
          name: android-api26-image-part-02
          path: build/android-api26-image.tar.gz.part-02
          compression-level: 0
      - uses: actions/upload-artifact@v4
        if: ${{ hashFiles('build/android-api26-image.tar.gz.part-03') != '' }}
        with:
          name: android-api26-image-part-03
          path: build/android-api26-image.tar.gz.part-03
          compression-level: 0
