name: Export local Android environment

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: android-actions/setup-android@v3

      - name: Install lightweight API 26 emulator environment
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "system-images;android-26;default;x86"

      - name: Package and split environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p export
          tar -C "$ANDROID_SDK_ROOT" -czf export/android-env.tar.gz \
            platform-tools \
            emulator \
            cmdline-tools/latest \
            system-images/android-26/default/x86
          sha256sum export/android-env.tar.gz > export/SHA256SUMS
          split -b 240M -d -a 2 export/android-env.tar.gz export/part-
          ls -lh export

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: local-android-env-manifest
          path: export/SHA256SUMS
          compression-level: 0

      - name: Upload part 00
        uses: actions/upload-artifact@v4
        with:
          name: local-android-env-part-00
          path: export/part-00
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload part 01
        uses: actions/upload-artifact@v4
        with:
          name: local-android-env-part-01
          path: export/part-01
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload part 02
        uses: actions/upload-artifact@v4
        with:
          name: local-android-env-part-02
          path: export/part-02
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload part 03
        uses: actions/upload-artifact@v4
        with:
          name: local-android-env-part-03
          path: export/part-03
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload part 04
        uses: actions/upload-artifact@v4
        with:
          name: local-android-env-part-04
          path: export/part-04
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload part 05
        uses: actions/upload-artifact@v4
        with:
          name: local-android-env-part-05
          path: export/part-05
          compression-level: 0
          if-no-files-found: ignore
