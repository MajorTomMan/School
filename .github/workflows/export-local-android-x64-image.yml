name: Export local Android x64 image

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: android-actions/setup-android@v3
      - name: Install API 26 x86_64 image
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "system-images;android-26;default;x86_64"
      - name: Package and split image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p export
          tar -C "$ANDROID_SDK_ROOT" -czf export/android-x64-image.tar.gz \
            system-images/android-26/default/x86_64
          sha256sum export/android-x64-image.tar.gz > export/SHA256SUMS
          split -b 240M -d -a 2 export/android-x64-image.tar.gz export/part-
          ls -lh export
      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: local-android-x64-manifest
          path: export/SHA256SUMS
          compression-level: 0
      - name: Upload part 00
        uses: actions/upload-artifact@v4
        with:
          name: local-android-x64-part-00
          path: export/part-00
          compression-level: 0
          if-no-files-found: ignore
      - name: Upload part 01
        uses: actions/upload-artifact@v4
        with:
          name: local-android-x64-part-01
          path: export/part-01
          compression-level: 0
          if-no-files-found: ignore
      - name: Upload part 02
        uses: actions/upload-artifact@v4
        with:
          name: local-android-x64-part-02
          path: export/part-02
          compression-level: 0
          if-no-files-found: ignore
