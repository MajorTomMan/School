name: One-time copy fix

on:
  push:
    branches: ["fix/number-line-copy"]

permissions:
  contents: write

jobs:
  fix-copy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct number-line copy and remove this workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("app/src/main/java/com/majortomman/school/ui/Screens.kt")
          content = path.read_text(encoding="utf-8")
          if "数轘" not in content:
              raise SystemExit("Expected typo was not found")
          path.write_text(content.replace("数轘", "数轴"), encoding="utf-8")
          PY
          rm .github/workflows/fix-copy-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/majortomman/school/ui/Screens.kt .github/workflows/fix-copy-once.yml
          git commit -m "fix: correct number-line copy"
          git push
