name: Fix math course build

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.head_ref == 'agent/full-math-course-pack-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Remove invalid Compose weight imports
        shell: bash
        run: |
          set -euo pipefail
          sed -i '/import androidx.compose.foundation.layout.weight/d' \
            app/src/main/java/com/majortomman/school/ui/CloudCourseBlockRenderer.kt \
            app/src/main/java/com/majortomman/school/ui/TextbookMathVisualizations.kt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/majortomman/school/ui/CloudCourseBlockRenderer.kt \
            app/src/main/java/com/majortomman/school/ui/TextbookMathVisualizations.kt
          git commit -m "修复：移除无效的 Compose weight 导入"
          git push origin "HEAD:${{ github.head_ref }}"
