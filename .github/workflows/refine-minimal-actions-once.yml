name: Refine minimal actions once

on:
  push:
    branches: ["feat/scene-ui-minimal-preview"]

permissions:
  contents: write

jobs:
  refine-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/scene-ui-minimal-preview
      - name: Refine independent outlined actions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("app/src/main/java/com/majortomman/school/ui/MinimalRemainingScreens.kt")
          content = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global content
              if old not in content:
                  raise SystemExit(f"Could not find block: {label}")
              content = content.replace(old, new, 1)

          replace_once(
              "import androidx.compose.foundation.background\n",
              "import androidx.compose.foundation.background\nimport androidx.compose.foundation.border\n",
              "border import",
          )
          replace_once(
              "import androidx.compose.foundation.shape.CircleShape\n",
              "import androidx.compose.foundation.shape.CircleShape\nimport androidx.compose.foundation.shape.RoundedCornerShape\n",
              "rounded shape import",
          )

          replace_once(
          '''                Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween,
                      verticalAlignment = Alignment.CenterVertically,
                  ) {
                      Text(
                          "返回",
                          modifier = Modifier.clickable(onClick = onBack),
                          color = MinimalMuted,
                      )
                      Text(
                          "${stepIndex + 1} / ${steps.size}",
                          color = MinimalMuted,
                          style = MaterialTheme.typography.labelMedium,
                      )
                  }
          ''',
          '''                Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.End,
                      verticalAlignment = Alignment.CenterVertically,
                  ) {
                      Text(
                          "${stepIndex + 1} / ${steps.size}",
                          color = MinimalMuted,
                          style = MaterialTheme.typography.labelMedium,
                      )
                  }
          ''',
              "top navigation",
          )

          replace_once(
          '''                Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween,
                      verticalAlignment = Alignment.CenterVertically,
                  ) {
                      Text(
                          if (helpVisible) "收起" else "我没看懂",
                          modifier = Modifier.clickable { helpVisible = !helpVisible },
                          color = MinimalMuted,
                      )
                      MinimalTextAction(
                          label = if (step == MinimalLessonStep.SUMMARY) "返回课程" else "继续",
                          color = MinimalBlue,
                      ) {
                          helpVisible = false
                          if (step == MinimalLessonStep.SUMMARY) onBack()
                          else stepIndex = (stepIndex + 1).coerceAtMost(steps.lastIndex)
                      }
                  }
          ''',
          '''                Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.spacedBy(8.dp),
                      verticalAlignment = Alignment.CenterVertically,
                  ) {
                      MinimalOutlinedAction(
                          label = "返回",
                          color = MinimalWhite.copy(alpha = 0.72f),
                          modifier = Modifier.weight(1f),
                          onClick = onBack,
                      )
                      MinimalOutlinedAction(
                          label = if (helpVisible) "收起" else "我没看懂",
                          color = MinimalYellow,
                          modifier = Modifier.weight(1f),
                      ) {
                          helpVisible = !helpVisible
                      }
                      MinimalOutlinedAction(
                          label = if (step == MinimalLessonStep.SUMMARY) "完成" else "继续",
                          color = MinimalBlue,
                          modifier = Modifier.weight(1f),
                      ) {
                          helpVisible = false
                          if (step == MinimalLessonStep.SUMMARY) onBack()
                          else stepIndex = (stepIndex + 1).coerceAtMost(steps.lastIndex)
                      }
                  }
          ''',
              "bottom navigation",
          )

          replace_once(
          '''        Row(
              modifier = Modifier.fillMaxWidth(),
              horizontalArrangement = Arrangement.SpaceBetween,
          ) {
              Text(
                  "提示",
                  modifier = Modifier.clickable { hint = (hint + 1).coerceAtMost(hints.size) },
                  color = MinimalYellow,
              )
              Text(
                  "本地检查",
                  modifier = Modifier.clickable(enabled = answer.isNotBlank()) {
                      val compact = answer.replace(" ", "")
                      val correct = compact.contains("2") && (compact.contains("大") || compact.contains(">"))
                      val feedback = if (correct) {
                          "判断正确。2 位于 -3 的右侧。"
                      } else {
                          "再检查两个数在数轴上的左右位置。"
                      }
                      result = feedback
                      mistakeType = if (correct) null else "位置关系"
                      onRecordAttempt(answer, correct, feedback)
                  },
                  color = if (answer.isBlank()) MinimalMuted else MinimalBlue,
                  fontWeight = FontWeight.SemiBold,
              )
          }
          Spacer(Modifier.height(18.dp))
          Text(
              if (isEvaluating) "批改中…" else "使用 AI 批改",
              modifier = Modifier.clickable(
                  enabled = answer.isNotBlank() && !isEvaluating && settings.endpoint.isNotBlank() && settings.model.isNotBlank(),
              ) {
                  isEvaluating = true
                  result = "正在理解你的答案…"
                  scope.launch {
                      val evaluation = runCatching {
                          OpenAiCompatibleClient(settings).evaluateAnswer(question, answer)
                      }.getOrElse { error ->
                          result = "AI 批改失败：${error.message ?: error::class.java.simpleName}"
                          mistakeType = "连接失败"
                          isEvaluating = false
                          return@launch
                      }
                      result = evaluation.feedback
                      mistakeType = evaluation.mistakeType
                      onRecordAttempt(answer, evaluation.correct, evaluation.feedback)
                      isEvaluating = false
                  }
              },
              color = if (answer.isBlank()) MinimalMuted else MinimalBlue,
              fontWeight = FontWeight.SemiBold,
          )
          ''',
          '''        Row(
              modifier = Modifier.fillMaxWidth(),
              horizontalArrangement = Arrangement.spacedBy(8.dp),
              verticalAlignment = Alignment.CenterVertically,
          ) {
              MinimalOutlinedAction(
                  label = "提示",
                  color = MinimalYellow,
                  modifier = Modifier.weight(1f),
              ) {
                  hint = (hint + 1).coerceAtMost(hints.size)
              }
              MinimalOutlinedAction(
                  label = "本地检查",
                  color = MinimalBlue,
                  enabled = answer.isNotBlank(),
                  modifier = Modifier.weight(1f),
              ) {
                  val compact = answer.replace(" ", "")
                  val correct = compact.contains("2") && (compact.contains("大") || compact.contains(">"))
                  val feedback = if (correct) {
                      "判断正确。2 位于 -3 的右侧。"
                  } else {
                      "再检查两个数在数轴上的左右位置。"
                  }
                  result = feedback
                  mistakeType = if (correct) null else "位置关系"
                  onRecordAttempt(answer, correct, feedback)
              }
              MinimalOutlinedAction(
                  label = if (isEvaluating) "批改中…" else "AI 批改",
                  color = MinimalWhite.copy(alpha = 0.82f),
                  enabled = answer.isNotBlank() && !isEvaluating && settings.endpoint.isNotBlank() && settings.model.isNotBlank(),
                  modifier = Modifier.weight(1f),
              ) {
                  isEvaluating = true
                  result = "正在理解你的答案…"
                  scope.launch {
                      val evaluation = runCatching {
                          OpenAiCompatibleClient(settings).evaluateAnswer(question, answer)
                      }.getOrElse { error ->
                          result = "AI 批改失败：${error.message ?: error::class.java.simpleName}"
                          mistakeType = "连接失败"
                          isEvaluating = false
                          return@launch
                      }
                      result = evaluation.feedback
                      mistakeType = evaluation.mistakeType
                      onRecordAttempt(answer, evaluation.correct, evaluation.feedback)
                      isEvaluating = false
                  }
              }
          }
          ''',
              "practice actions",
          )

          marker = '''@Composable
          private fun MinimalTextAction(label: String, color: Color, onClick: () -> Unit) {
          '''
          helper = '''@Composable
          private fun MinimalOutlinedAction(
              label: String,
              color: Color,
              modifier: Modifier = Modifier,
              enabled: Boolean = true,
              onClick: () -> Unit,
          ) {
              val contentColor = if (enabled) color else MinimalMuted.copy(alpha = 0.52f)
              val borderColor = if (enabled) color.copy(alpha = 0.82f) else MinimalLine
              Box(
                  modifier = modifier
                      .height(48.dp)
                      .border(1.dp, borderColor, RoundedCornerShape(8.dp))
                      .clip(RoundedCornerShape(8.dp))
                      .clickable(enabled = enabled, onClick = onClick)
                      .padding(horizontal = 8.dp),
                  contentAlignment = Alignment.Center,
              ) {
                  Text(
                      text = label,
                      color = contentColor,
                      fontSize = 14.sp,
                      fontWeight = FontWeight.SemiBold,
                      textAlign = TextAlign.Center,
                      maxLines = 1,
                  )
              }
          }

          '''
          if marker not in content:
              raise SystemExit("Could not find MinimalTextAction marker")
          content = content.replace(marker, helper + marker, 1)

          path.write_text(content, encoding="utf-8")
          PY

          rm .github/workflows/refine-minimal-actions-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/majortomman/school/ui/MinimalRemainingScreens.kt .github/workflows/refine-minimal-actions-once.yml
          git commit -m "界面：调整练习与底部按钮布局"
          git push origin HEAD:feat/scene-ui-minimal-preview
