name: Wire material pack once

on:
  push:
    branches: ["feat/material-pack-v1"]

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/material-pack-v1
      - name: Update learning flow signatures
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          scene = Path("app/src/main/java/com/majortomman/school/ui/ScenePreviewScreens.kt")
          text = scene.read_text(encoding="utf-8")
          text = text.replace(
              "import com.majortomman.school.data.Lesson\n",
              "import com.majortomman.school.data.Lesson\nimport com.majortomman.school.data.material.InstalledMaterialPack\n",
              1,
          )
          old = '''fun SceneLearningScreen(
              lesson: Lesson,
              aiSettings: AiSettings,
              progress: LearningProgress,
              onBack: () -> Unit,
              onRecordAttempt: (answer: String, correct: Boolean, feedback: String) -> Unit,
          ) {'''
          new = '''fun SceneLearningScreen(
              lesson: Lesson,
              aiSettings: AiSettings,
              progress: LearningProgress,
              installedMaterial: InstalledMaterialPack?,
              onOpenTextbook: (Int) -> Unit,
              onBack: () -> Unit,
              onRecordAttempt: (answer: String, correct: Boolean, feedback: String) -> Unit,
          ) {'''
          if old not in text:
              raise SystemExit("SceneLearningScreen signature not found")
          text = text.replace(old, new, 1)
          old = '''        LearningScreen(
                      lesson = lesson,
                      aiSettings = aiSettings,
                      progress = progress,
                      onBack = onBack,
                      onRecordAttempt = onRecordAttempt,
                  )'''
          new = '''        LearningScreen(
                      lesson = lesson,
                      aiSettings = aiSettings,
                      progress = progress,
                      installedMaterial = installedMaterial,
                      onOpenTextbook = onOpenTextbook,
                      onBack = onBack,
                      onRecordAttempt = onRecordAttempt,
                  )'''
          if old not in text:
              raise SystemExit("LearningScreen bridge not found")
          scene.write_text(text.replace(old, new, 1), encoding="utf-8")

          lesson = Path("app/src/main/java/com/majortomman/school/ui/MinimalLearningScreenV2.kt")
          text = lesson.read_text(encoding="utf-8")
          text = text.replace(
              "import com.majortomman.school.data.Lesson\n",
              "import com.majortomman.school.data.Lesson\nimport com.majortomman.school.data.material.InstalledMaterialPack\n",
              1,
          )
          old = '''fun MinimalLearningScreenV2(
              lesson: Lesson,
              aiSettings: AiSettings,
              progress: LearningProgress,
              onBack: () -> Unit,
              onRecordAttempt: (answer: String, correct: Boolean, feedback: String) -> Unit,
          ) {'''
          new = '''fun MinimalLearningScreenV2(
              lesson: Lesson,
              aiSettings: AiSettings,
              progress: LearningProgress,
              installedMaterial: InstalledMaterialPack?,
              onOpenTextbook: (Int) -> Unit,
              onBack: () -> Unit,
              onRecordAttempt: (answer: String, correct: Boolean, feedback: String) -> Unit,
          ) {'''
          if old not in text:
              raise SystemExit("MinimalLearningScreenV2 signature not found")
          text = text.replace(old, new, 1)
          text = text.replace(
              "LessonPage.TEXTBOOK -> LessonTextbook(lesson)",
              "LessonPage.TEXTBOOK -> LessonTextbook(lesson, installedMaterial, onOpenTextbook)",
              1,
          )
          old = '''@Composable
          private fun LessonTextbook(lesson: Lesson) = LessonScroll {
              Spacer(Modifier.height(90.dp))
              Text("教材", color = LessonMuted, fontSize = 15.sp)
              Spacer(Modifier.height(10.dp))
              Text(
                  "${lesson.textbookPages.first}—${lesson.textbookPages.last}",
                  color = LessonYellow,
                  fontSize = 72.sp,
                  fontWeight = FontWeight.Bold,
              )
              Text("页", color = LessonWhite, fontSize = 25.sp)
              Spacer(Modifier.height(40.dp))
              LessonDivider()
              Spacer(Modifier.height(24.dp))
              Text(
                  "真实教材导入后，这里直接打开对应页。\\n不再让你从整本书里寻找上下文。",
                  color = LessonWhite.copy(alpha = 0.67f),
                  fontSize = 18.sp,
                  lineHeight = 28.sp,
              )
          }'''
          new = '''@Composable
          private fun LessonTextbook(
              lesson: Lesson,
              installedMaterial: InstalledMaterialPack?,
              onOpenTextbook: (Int) -> Unit,
          ) = LessonScroll {
              Spacer(Modifier.height(78.dp))
              Text("教材", color = LessonMuted, fontSize = 15.sp)
              Spacer(Modifier.height(10.dp))
              Text(
                  "${lesson.textbookPages.first}—${lesson.textbookPages.last}",
                  color = LessonYellow,
                  fontSize = 72.sp,
                  fontWeight = FontWeight.Bold,
              )
              Text("页", color = LessonWhite, fontSize = 25.sp)
              Spacer(Modifier.height(34.dp))
              LessonDivider()
              Spacer(Modifier.height(24.dp))
              if (installedMaterial == null) {
                  Text(
                      "尚未导入教材包。\\n进入设置，选择 School Material Pack ZIP。",
                      color = LessonWhite.copy(alpha = 0.67f),
                      fontSize = 18.sp,
                      lineHeight = 28.sp,
                  )
              } else {
                  Text(
                      installedMaterial.manifest.title + " · " + installedMaterial.manifest.version,
                      color = LessonWhite.copy(alpha = 0.67f),
                      fontSize = 17.sp,
                  )
                  Spacer(Modifier.height(24.dp))
                  LessonOutlinedAction(
                      label = "打开第 ${lesson.textbookPages.first} 页",
                      color = LessonYellow,
                      modifier = Modifier.fillMaxWidth(),
                  ) {
                      onOpenTextbook(lesson.textbookPages.first)
                  }
              }
          }'''
          if old not in text:
              raise SystemExit("LessonTextbook block not found")
          lesson.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          rm .github/workflows/wire-material-pack-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/majortomman/school/ui/ScenePreviewScreens.kt \
                  app/src/main/java/com/majortomman/school/ui/MinimalLearningScreenV2.kt \
                  .github/workflows/wire-material-pack-once.yml
          git commit -m "教材：在学习页打开对应 PDF 页面"
          git push origin HEAD:feat/material-pack-v1
