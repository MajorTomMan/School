name: Export portable Android runtime

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: android-actions/setup-android@v3

      - name: Install runtime packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "system-images;android-26;default;x86"

      - name: Create and initialize AVD
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          export ANDROID_USER_HOME="$RUNNER_TEMP/android-home"
          export ANDROID_AVD_HOME="$ANDROID_USER_HOME/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          touch "$ANDROID_USER_HOME/repositories.cfg"

          echo no | avdmanager create avd \
            -n school_api26_x86 \
            -k "system-images;android-26;default;x86" \
            --device pixel \
            --force

          cat >> "$ANDROID_AVD_HOME/school_api26_x86.avd/config.ini" <<'EOF'
          hw.cpu.ncore=2
          hw.ramSize=1024
          hw.lcd.width=480
          hw.lcd.height=800
          hw.lcd.density=240
          disk.dataPartition.size=2G
          showDeviceFrame=no
          skin.dynamic=yes
          EOF

          sudo chmod 666 /dev/kvm || true
          nohup "$ANDROID_SDK_ROOT/emulator/emulator" @school_api26_x86 \
            -no-window -no-audio -no-boot-anim -no-metrics \
            -gpu swiftshader_indirect -no-snapshot \
            > "$RUNNER_TEMP/runtime-emulator.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/runtime-emulator.pid"

          timeout 420 bash -c '
            adb wait-for-device
            until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = "1" ]; do
              sleep 2
            done
          '

          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb shell input keyevent 82 || true
          adb shell sync
          adb emu kill || true
          timeout 90 bash -c 'while kill -0 "$(cat "$RUNNER_TEMP/runtime-emulator.pid")" 2>/dev/null; do sleep 2; done' || true
          tail -100 "$RUNNER_TEMP/runtime-emulator.log"

      - name: Package portable runtime
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/portable-android-runtime"
          mkdir -p "$ROOT/android-sdk" "$ROOT/android-home/avd" export

          cp -a "$ANDROID_SDK_ROOT/emulator" "$ROOT/android-sdk/"
          cp -a "$ANDROID_SDK_ROOT/platform-tools" "$ROOT/android-sdk/"
          mkdir -p "$ROOT/android-sdk/system-images/android-26/default"
          cp -a "$ANDROID_SDK_ROOT/system-images/android-26/default/x86" \
            "$ROOT/android-sdk/system-images/android-26/default/"
          if [ -d "$ANDROID_SDK_ROOT/licenses" ]; then
            cp -a "$ANDROID_SDK_ROOT/licenses" "$ROOT/android-sdk/"
          fi

          cp -a "$RUNNER_TEMP/android-home/avd/school_api26_x86.ini" "$ROOT/android-home/avd/"
          cp -a "$RUNNER_TEMP/android-home/avd/school_api26_x86.avd" "$ROOT/android-home/avd/"

          cat > "$ROOT/start-emulator.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          ROOT="$(cd "$(dirname "$0")" && pwd)"
          export ANDROID_SDK_ROOT="$ROOT/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export ANDROID_USER_HOME="$ROOT/android-home"
          export ANDROID_AVD_HOME="$ANDROID_USER_HOME/avd"
          export PATH="$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          exec "$ANDROID_SDK_ROOT/emulator/emulator" @school_api26_x86 \
            -no-window -no-audio -no-boot-anim -no-metrics \
            -no-accel -gpu software -feature -Vulkan -no-snapshot "$@"
          EOF
          chmod +x "$ROOT/start-emulator.sh"

          cat > "$ROOT/env.sh" <<'EOF'
          ROOT="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export ANDROID_SDK_ROOT="$ROOT/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export ANDROID_USER_HOME="$ROOT/android-home"
          export ANDROID_AVD_HOME="$ANDROID_USER_HOME/avd"
          export PATH="$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          EOF

          tar -C "$RUNNER_TEMP" -czf export/portable-android-runtime.tar.gz portable-android-runtime
          sha256sum export/portable-android-runtime.tar.gz > export/SHA256SUMS
          split -b 190M -d -a 2 export/portable-android-runtime.tar.gz export/runtime-part-
          ls -lh export

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: portable-android-runtime-manifest
          path: export/SHA256SUMS
          compression-level: 0

      - name: Upload runtime part 00
        uses: actions/upload-artifact@v4
        with:
          name: portable-android-runtime-part-00
          path: export/runtime-part-00
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload runtime part 01
        uses: actions/upload-artifact@v4
        with:
          name: portable-android-runtime-part-01
          path: export/runtime-part-01
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload runtime part 02
        uses: actions/upload-artifact@v4
        with:
          name: portable-android-runtime-part-02
          path: export/runtime-part-02
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload runtime part 03
        uses: actions/upload-artifact@v4
        with:
          name: portable-android-runtime-part-03
          path: export/runtime-part-03
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload runtime part 04
        uses: actions/upload-artifact@v4
        with:
          name: portable-android-runtime-part-04
          path: export/runtime-part-04
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload runtime part 05
        uses: actions/upload-artifact@v4
        with:
          name: portable-android-runtime-part-05
          path: export/runtime-part-05
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portable-android-runtime-diagnostics
          path: ${{ runner.temp }}/runtime-emulator.log
          if-no-files-found: ignore
